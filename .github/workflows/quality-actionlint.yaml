---
name: Quality - Actionlint

on:
  pull_request:
    branches:
      - main

permissions: {}

jobs:
  actionlint:
    name: Actionlint
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0
        with:
          persist-credentials: false

      # Dogfooding 🐶
      - name: Run actionlint
        uses: ./
