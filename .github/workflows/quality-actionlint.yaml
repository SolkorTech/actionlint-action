---
name: Quality - Actionlint

on:
  pull_request:
    branches:
      - main

permissions: {}

jobs:
  actionlint:
    name: Actionlint
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      # Dogfooding 🐶
      - name: Run actionlint
        uses: ./
