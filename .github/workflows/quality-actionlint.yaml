---
name: Quality - Actionlint

on:
  pull_request:
    branches:
      - main

permissions: {}

jobs:
  actionlint:
    name: Actionlint
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      # Dogfooding 🐶
      - name: Run actionlint
        uses: ./
