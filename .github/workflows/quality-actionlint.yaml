---
name: Quality - Actionlint

on:
  pull_request:
    branches:
      - main

permissions: {}

jobs:
  actionlint:
    name: Actionlint
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      # Dogfooding 🐶
      - name: Run actionlint
        uses: ./
